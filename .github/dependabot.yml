# Dependabot keeps the few moving parts current and patched.
# nervepack is deliberately dependency-light — the engine itself is stdlib-only.
# The only third-party surfaces are the GitHub Actions in CI and the pinned
# Python packages used by the informational e2e test job.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # GitHub Actions used by .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"

  # Python deps for the Playwright dashboard e2e test (informational CI job).
  - package-ecosystem: "pip"
    directory: "/engine/setup/tests/e2e"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
