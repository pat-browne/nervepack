name: CI

on:
  push:
  pull_request:
  workflow_dispatch:        # ad-hoc manual runs from the Actions UI

jobs:
  syntax:
    name: Syntax sweep (stdlib-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Python syntax (py_compile)
        run: |
          files=$(git ls-files '*.py')
          echo "Checking $(echo "$files" | grep -c . ) Python file(s)"
          echo "$files" | xargs -r python3 -m py_compile

      - name: Bash syntax (bash -n)
        run: |
          fail=0
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            bash -n "$f" || { echo "SYNTAX FAIL: $f"; fail=1; }
          done < <(git ls-files '*.sh')
          exit $fail

  regression:
    name: Regression suite (zero-dep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # The runner discovers every test_*.sh / test_*.py under engine/setup/tests/
      # (excluding the e2e suite, which needs a browser — see the dashboard-e2e job),
      # runs each hermetically, and writes a functionality-grouped Markdown report.
      - name: Run regression suite
        run: bash engine/setup/tests/run-all.sh --report regression-report.md

      - name: Publish report to job summary
        if: always()
        run: cat regression-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-report
          path: regression-report.md

  dashboard-e2e:
    name: Dashboard e2e (Playwright, informational)
    runs-on: ubuntu-latest
    continue-on-error: true        # informational — never blocks merge
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          # Pin to 3.12: playwright 1.48.0 pins greenlet 3.1.1, which has no wheel for
          # the very newest CPython (3.14) and fails to build from source in CI. The
          # zero-dep `regression` job stays on "3.x".
          python-version: "3.12"

      - name: Install Playwright + chromium
        run: |
          pip install -r engine/setup/tests/e2e/requirements.txt
          python3 -m playwright install --with-deps chromium

      - name: Run e2e
        working-directory: engine/setup/tests/e2e
        run: python3 -m unittest test_implement_flow -v 2>&1 | tee "$GITHUB_WORKSPACE/e2e-report.txt"

      - name: Publish e2e to job summary
        if: always()
        run: |
          {
            echo "## Dashboard e2e"
            echo '```'
            cat e2e-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload e2e report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-report
          path: e2e-report.txt

  windows:
    name: Windows suite (Git-bash)
    runs-on: windows-latest        # required gate — the suite is green end-to-end under Git-bash
    defaults:
      run:
        shell: bash                # the Git-for-Windows bash on the runner
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      # The runner discovers `.py` tests and invokes them as `python3`, which the
      # Windows Python install exposes only as `python`. Shim it onto PATH so the
      # same runner works unmodified. GITHUB_PATH persists the (absolute) dir across
      # the suite even after each test reassigns $HOME for its hermetic sandbox.
      - name: Shim python3 -> python
        run: |
          if ! command -v python3 >/dev/null 2>&1; then
            mkdir -p "$HOME/bin"
            printf '#!/usr/bin/env bash\nexec python "$@"\n' > "$HOME/bin/python3"
            chmod +x "$HOME/bin/python3"
            echo "$HOME/bin" >> "$GITHUB_PATH"
          fi

      # MSYS=winsymlinks:nativestrict makes Git-bash `ln -s` create real NTFS symlinks
      # (the runner is elevated), so the skill-link tests' `test -L`/`readlink` behave
      # as on Linux. jq is preinstalled on the windows-latest image.
      - name: Run regression suite
        env:
          MSYS: winsymlinks:nativestrict
        run: bash engine/setup/tests/run-all.sh --report regression-report-win.md

      # run-all.sh only echoes a test's captured stdout when it FAILS, so
      # test_pid_alive_diag.sh's evidence (raw OpenProcess/GetLastError, ps
      # WINPID cross-check) never reaches the log on a PASS -- it mirrors its
      # own output to this fixed path specifically so it's visible either way.
      - name: Publish pid diagnostic evidence
        if: always()
        run: |
          if [[ -f .ci-debug-pid-diag.log ]]; then
            echo "## PID liveness diagnostic evidence" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat .ci-debug-pid-diag.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish report to job summary
        if: always()
        run: cat regression-report-win.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-report-windows
          path: regression-report-win.md

  windows-bashfree:
    name: Bash-free MCP suite (no Git-bash)
    runs-on: windows-latest
    # Required gate (git-for-windows-free MCP milestone, #38, complete). Proves the
    # ported MCP surface — protocol + resources + prompts, gating, content resolution,
    # recall, doctor(core), toggle(status+local), sync, capture, evaluate — works with
    # Git for Windows absent. The two tools that still need bash (flush/maintain) are
    # out of scope and refuse cleanly; see tests/mcp/test_bashfree.py.
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run the bash-free MCP test with Git-bash removed from PATH
        shell: pwsh
        env:
          NP_MCP_PURE_PYTHON: "1"
        run: |
          # Remove the Git-bash dirs (Git\bin, Git\usr\bin — both ship bash.exe/sh)
          # from PATH for this step, the real-world "no Git-bash" condition — but KEEP
          # git.exe (Git\cmd, Git\mingw64\bin) and Python, since the spec's bash-free
          # host still has native git. The test also pins a bogus NP_BASH so any
          # accidental shell-out fails loudly rather than finding some other bash.
          $env:PATH = ($env:PATH -split ';' |
            Where-Object { $_ -notmatch '\\Git\\bin' -and $_ -notmatch '\\Git\\usr' }) -join ';'
          $bash = (Get-Command bash -ErrorAction SilentlyContinue).Source
          Write-Host "Git-bash removed from PATH; 'bash' now resolves to: $bash"
          git --version          # native git must survive (doctor's git-sync check)
          python --version
          python engine/setup/tests/mcp/test_bashfree.py -v

  pii-guard:
    name: Secret/PII guard (terminal gate)
    runs-on: ubuntu-latest
    needs: [syntax, regression]    # terminal gate — runs only after the blocking jobs pass
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      # Fail the build if any non-allowlisted secret/PII lands in a committed
      # engine file. Personal content lives in a separate overlay repo, so the
      # engine tree is the publishable surface and must stay clean. The scanner
      # is pure stdlib and takes only the checked-out path — no untrusted input.
      - name: Scan engine tree for secrets/PII
        run: python3 publish/np-publish-scan.py "$GITHUB_WORKSPACE"
