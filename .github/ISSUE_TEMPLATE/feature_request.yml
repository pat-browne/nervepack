name: Feature request
description: Suggest a capability or improvement for the engine.
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        nervepack is deliberately dependency-light and surgical. Proposals that
        keep it that way land fastest. **No personal data** in your request.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Start with the need, not the solution. What's painful today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: >
        Your proposed approach. If it adds a hook, cron, or managed config,
        note that it would need a toggle (see CONTRIBUTING.md).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one wins.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: This is about the engine, not personal content overlay behavior.
          required: true
