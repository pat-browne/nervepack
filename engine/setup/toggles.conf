# Nervepack feature toggle manifest. Source of truth (committed).
# feature|scope|enforce|state|param
# scope: shared (state here, cross-machine) | local (state in ~/.config/nervepack/toggles.local)
# enforce: runtime (script checks np_enabled) | cron | managed (toggle installs/removes)
memory|shared|runtime|on|cap_bytes=48000,backcapture_days=7,backcapture_max=5
lessons|shared|runtime|on|enforce=on
directive|shared|runtime|on|
sync|shared|runtime|on|interval=86400
allowlist|local|managed|on|
evaluator|shared|runtime|on|cap_bytes=32000,dashboard_sessions=5,dashboard_open=on,dashboard_serve=on,dashboard_port=8787,suggestions_top=10,implement=on,implement_mode=pr,escalation_min_struggles=2,escalation_min_prompts=3,retain_days=90,wiki_nav=on,wiki_mermaid=on,toggle_ui=on
skills|shared|runtime|on|split_kb=8,soft_kb=6,catalog_tok=4000,max_per_run=2,graduate_seen=10,graduate_kb=6
team|shared|runtime|on|merge=override
mcp|shared|soft|on|writes=on,contribute=off
maintain|shared|runtime|on|
maintain.refine|shared|runtime|on|
maintain.compact|shared|runtime|on|
pii_filter|shared|runtime|off|
resume|shared|runtime|on|interval=300,max_age=86400,cron=off,cron_min=5,active_window=900
